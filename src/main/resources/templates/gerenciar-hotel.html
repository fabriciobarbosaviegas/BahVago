<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BahVago Admin - Gerenciar Hotel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-panel-body">

    <div class="admin-layout-wrapper">
        <aside class="admin-sidebar">
            <div class="sidebar-brand">
                <span class="logo-icon">B</span>
                <div><h4>BahVago</h4><small>Gerente</small></div>
            </div>
            <nav class="sidebar-menu">
                <a href="/dashboard" class="menu-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="/gerenciar-hotel" class="menu-item active"><i class="fa-solid fa-hotel"></i> Meu hotel</a>
                <a href="/gerenciar-quartos" class="menu-item"><i class="fa-solid fa-bed"></i> Quartos</a>
                <a href="/estatisticas" class="menu-item"><i class="fa-solid fa-chart-bar"></i> Estatísticas</a>
                <a href="/gerenciar-avaliacoes" class="menu-item"><i class="fa-solid fa-comment-dots"></i> Avaliações</a>
            </nav>
            <div class="sidebar-footer"><a href="/" class="menu-item logout"><i class="fa-solid fa-arrow-left"></i> Voltar ao site</a></div>
        </aside>

        <main class="admin-main-content">
            <header class="admin-content-header">
                <div>
                    <h1>Gerenciar hotel</h1>
                    <p>Edite os dados públicos do seu estabelecimento</p>
                </div>
            </header>

            <div class="admin-forms-stack">
                <form class="admin-card-form" id="formInfoHotel" method="post" th:action="@{/hoteis/criar}" enctype="multipart/form-data">
                    <h3>Informações básicas</h3>
                    <div class="form-inputs-row columns-2">
                        <div class="auth-input-group"><label>Nome do hotel</label><input type="text" name="nome" value="Grand Luxury Hotel & Spa" required></div>
                        <div class="auth-input-group"><label>Cidade</label><input type="text" name="localizacao.cidade" value="Rio de Janeiro"></div>
                    </div>
                    <div class="form-inputs-row columns-2">
                        <div class="auth-input-group"><label>Estado</label><input type="text" name="localizacao.estado" value="RJ"></div>
                        <div class="auth-input-group"><label>Endereço completo</label><input type="text" name="localizacao.enderecoAproximado" value="Av. Atlântica, 1020 - Copacabana"></div>
                    </div>
                    <div class="auth-input-group">
                        <label>Descrição</label>
                        <textarea name="descricao" rows="4">Experimente o luxo incomparável no Grand Luxury Hotel & Spa, localizado no coração do Rio de Janeiro. Com vistas deslumbrantes para a praia de Copacabana, nosso hotel oferece quartos espaçosos e elegantemente decorados.</textarea>
                    </div>

                    <div class="auth-input-group">
                        <label>Imagens do Hotel (Arquivos do Computador - Selecione 1 ou vários)</label>
                        <input type="file" name="imagemArquivos" accept="image/*" multiple class="form-control">
                    </div>

                    <div class="auth-input-group">
                        <label>OU URLs das Imagens (Separadas por vírgula ou linha)</label>
                        <textarea name="imagensUrls" rows="3" placeholder="https://exemplo.com/foto1.jpg&#10;https://exemplo.com/foto2.jpg"></textarea>
                    </div>

                    <button type="submit" class="btn-primary w-fit">Salvar alterações</button>
                </form>

                <div class="admin-grid-two-columns">
                    <div class="admin-card-form">
                        <h3>Fotos do hotel</h3>
                        <div class="admin-thumb-gallery-preview">
                            <img th:each="img : ${hotel != null and hotel.imagens != null and !hotel.imagens.isEmpty() ? hotel.imagens : #arrays.toArray({'https://blog.iprocess.com.br/wp-content/uploads/2021/11/placeholder.png'})}"
                                 th:src="${img}"
                                 src="https://blog.iprocess.com.br/wp-content/uploads/2021/11/placeholder.png">
                        </div>
                    </div>

                    <form class="admin-card-form" id="formComodidadesHotel">
                        <h3>Comodidades</h3>
                        <div class="admin-checkbox-list-stack">
                            <label class="checkbox-container"><input type="checkbox" checked> Wi-Fi gratuito</label>
                            <label class="checkbox-container"><input type="checkbox" checked> Estacionamento</label>
                            <label class="checkbox-container"><input type="checkbox" checked> Piscina</label>
                            <label class="checkbox-container"><input type="checkbox" checked> Academia</label>
                            <label class="checkbox-container"><input type="checkbox" checked> Café da manhã</label>
                            <label class="checkbox-container"><input type="checkbox" checked> Ar condicionado</label>
                        </div>
                        <button type="submit" class="btn-secondary-outline mt-16">Salvar comodidades</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/script.js"></script>
</body>
</html>
