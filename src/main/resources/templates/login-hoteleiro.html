<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BahVago - Login Hoteleiro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-page" style="justify-content: center; align-items: center;">
        
        <div class="auth-card">
            <div class="logo" style="justify-content: center; margin-bottom: 24px; cursor: pointer;" onclick="window.location.href='/'">
                <span class="logo-icon">B</span>
                <span class="logo-text">BahVago</span>
            </div>
            
            <h2 style="text-align: center; margin-bottom: 8px;">Bem-vindo de volta</h2>
            <p class="auth-subtitle" style="text-align: center; margin-bottom: 24px;">Entre na sua conta hoteleiro para continuar</p>

            <div th:if="${param.error}" class="auth-input-group">
                <p style="color: #cc0000; margin: 0; font-size: 0.9rem; text-align: center;">E-mail ou senha invalidos.</p>
            </div>

            <div th:if="${param.logout}" class="auth-input-group">
                <p style="color: #0a7b34; margin: 0; font-size: 0.9rem; text-align: center;">Voce saiu da conta com sucesso.</p>
            </div>

            <form id="formLoginHoteleiro" th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="auth-input-group">
                    <label for="hotelEmail">E-mail</label>
                    <input type="email" id="hotelEmail" name="email" placeholder="seu@email.com" autocomplete="email" required>
                </div>
                
                <div class="auth-input-group">
                    <label for="hotelPassword">Senha</label>
                    <input type="password" id="hotelPassword" name="senha" placeholder="********" autocomplete="current-password" required>
                </div>

                <div class="auth-options">
                    <label class="checkbox-container">
                        <input type="checkbox"> Lembrar de mim
                    </label>
                    <a href="#" class="auth-link">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-auth">Entrar</button>
                
                <p class="auth-footer-text">
                    Problemas com acesso? <a href="#" class="auth-accent-link">Contate-nos</a>
                </p>
            </form>
        </div>

    </div>

    <script src="/js/script.js"></script>
</body>
</html>
