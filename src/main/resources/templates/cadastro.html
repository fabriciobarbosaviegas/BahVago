<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BahVago - Cadastro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-page">
        <div class="auth-image-side" style="background-image: linear-gradient(rgba(15, 25, 46, 0.2), rgba(15, 25, 46, 0.6)), url('https://images.unsplash.com/photo-1571896349842-33c89424de2d?auto=format&fit=crop&w=1000&q=80');">
            <div class="auth-image-content">
                <h2>Junte-se a milhares de viajantes</h2>
                <p>Crie sua conta e comece a planejar sua próxima aventura</p>
            </div>
        </div>

        <div class="auth-form-side">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-icon">B</span>
                    BahVago </div>
            </div>

            <div class="auth-card">
                <h2>Criar conta</h2>
                <p class="auth-subtitle">Preencha os dados para começar</p>

                <form id="cadastroForm">
                    <div class="auth-input-group">
                        <label for="nome">Nome completo</label>
                        <input type="text" id="nome" placeholder="João Silva" required>
                    </div>

                    <div class="auth-input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>

                    <div class="auth-input-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00" required>
                    </div>

                    <div class="auth-input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <div class="auth-input-group">
                        <label for="confirm-password">Confirmar senha</label>
                        <input type="password" id="confirm-password" placeholder="••••••••" required>
                    </div>

                    <div class="auth-options">
                        <label class="checkbox-container">
                            <input type="checkbox" required> 
                            <span>Concordo com os <a href="#" class="auth-inline-link">termos de uso</a> e <a href="#" class="auth-inline-link">política de privacidade</a></span>
                        </label>
                    </div>

                    <button type="submit" class="btn-auth">Criar conta</button>
                </form>

                <p class="auth-footer-text">Já tem uma conta? <a href="/login" class="auth-accent-link">Fazer login</a></p>
            </div>
        </div>
    </div>

    <script>
        // CPF mask: 000.000.000-00
        (function(){
            var cpfInput = document.getElementById('cpf');
            function maskCPF(value){
                // remove non-digits
                value = value.replace(/\D/g,'');
                // apply mask
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})\.(\d{3})(\d)/, '$1.$2.$3');
                value = value.replace(/(\d{3})\.(\d{3})\.(\d{3})(\d)/, '$1.$2.$3-$4');
                return value.slice(0,14);
            }
            cpfInput.addEventListener('input', function(e){
                var start = this.selectionStart;
                var old = this.value;
                this.value = maskCPF(this.value);
                // try to keep caret at a reasonable position
                var diff = this.value.length - old.length;
                this.selectionStart = this.selectionEnd = Math.max(0, start + diff);
            });
            cpfInput.addEventListener('blur', function(){
                // optional: if incomplete, clear
                if (this.value.replace(/\D/g,'').length !== 11) {
                    // keep as is or optionally show validation; here we just leave it
                }
            });

            document.getElementById('cadastroForm').addEventListener('submit', function(e) {
                e.preventDefault();
                alert('Cadastro realizado com sucesso!');
                window.location.href = '/login';
            });
        })();
    </script>
</body>
</html>
