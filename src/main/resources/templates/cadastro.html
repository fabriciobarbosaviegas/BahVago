<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BahVago - Cadastro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}" href="css/style.css">
</head>

<body>

    <div class="auth-page">
        <div class="auth-image-side"
            style="background-image: linear-gradient(rgba(15, 25, 46, 0.2), rgba(15, 25, 46, 0.6)), url('https://images.unsplash.com/photo-1571896349842-33c89424de2d?auto=format&fit=crop&w=1000&q=80');">
            <div class="auth-image-content">
                <h2>Junte-se a milhares de viajantes</h2>
                <p>Crie sua conta e comece a planejar sua próxima aventura</p>
            </div>
        </div>

        <div class="auth-form-side">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-icon">B</span>
                    BahVago
                </div>
            </div>

            <div class="auth-card">
                <h2>Criar conta</h2>
                <p class="auth-subtitle">Preencha os dados para começar</p>

                <form id="cadastroForm" th:action="@{/usuarios/cadastro}" th:object="${cadastroUsuarioForm}" method="post" novalidate>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div th:if="${#fields.hasGlobalErrors()}" class="auth-input-group">
                        <p th:each="err : ${#fields.globalErrors()}" th:text="${err}" style="color: #cc0000; margin: 0; font-size: 0.9rem;"></p>
                    </div>

                    <div class="auth-input-group">
                        <label for="nome">Nome completo</label>
                        <input type="text" id="nome" th:field="*{nome}" placeholder="Joao Silva" maxlength="120" autocomplete="name" required>
                        <small th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" style="color: #cc0000;"></small>
                    </div>

                    <div class="auth-input-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" th:field="*{cpf}" placeholder="000.000.000-00" maxlength="14" inputmode="numeric" autocomplete="off" required>
                        <small th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}" style="color: #cc0000;"></small>
                    </div>

                    <div class="auth-input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" th:field="*{email}" placeholder="seu@email.com" maxlength="255" autocomplete="email" required>
                        <small th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: #cc0000;"></small>
                    </div>

                    <div class="auth-input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" th:field="*{senha}" placeholder="********" minlength="8" maxlength="72" autocomplete="new-password" required>
                        <small th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}" style="color: #cc0000;"></small>
                    </div>

                    <div class="auth-input-group">
                        <label for="confirm-password">Confirmar senha</label>
                        <input type="password" id="confirm-password" th:field="*{confirmarSenha}" placeholder="********" minlength="8" maxlength="72" autocomplete="new-password" required>
                        <small th:if="${#fields.hasErrors('confirmarSenha')}" th:errors="*{confirmarSenha}" style="color: #cc0000;"></small>
                    </div>

                    <div class="auth-options">
                        <label class="checkbox-container">
                                <input type="checkbox" required>
                            <span>Concordo com os <a href="/termos" class="auth-inline-link">termos de uso</a> e <a href="/politicas"
                                    class="auth-inline-link">política de privacidade</a></span>
                        </label>
                    </div>

                    <button type="submit" class="btn-auth">Criar conta</button>
                </form>

                <p class="auth-footer-text">Já tem uma conta? <a href="/login" class="auth-accent-link">Fazer login</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        (function () {
            let cpfInput = document.getElementById('cpf');
            let password = document.getElementById('password');
            let confirm = document.getElementById('confirm-password');

            function maskCpf(value) {
                value = value.replace(/\D/g, '');
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})\.(\d{3})(\d)/, '$1.$2.$3');
                value = value.replace(/(\d{3})\.(\d{3})\.(\d{3})(\d)/, '$1.$2.$3-$4');
                return value.slice(0, 14);
            }

            cpfInput.addEventListener('input', function () {
                this.value = maskCpf(this.value);
            });

            function validatePasswords() {
                if (password.value === confirm.value) {
                    confirm.setCustomValidity('');
                    return true;
                } else {
                    confirm.setCustomValidity('As senhas não coincidem');
                    return false;
                }
            }

            password.addEventListener('input', validatePasswords);
            confirm.addEventListener('input', validatePasswords);
        })();
    </script>
</body>

</html>
