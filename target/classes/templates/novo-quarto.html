<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BahVago Admin - Cadastrar Quarto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-panel-body">

    <div class="admin-layout-wrapper">
        <aside class="admin-sidebar">
            <div class="sidebar-brand">
                <span class="logo-icon">H</span>
                <div><h4>BahVago</h4><small>Gerente</small></div>
            </div>
            <nav class="sidebar-menu">
                <a href="/dashboard" class="menu-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="/hoteis/gerenciar-hotel" class="menu-item"><i class="fa-solid fa-hotel"></i> Meu hotel</a>
                <a href="/gerenciar-quartos" class="menu-item active"><i class="fa-solid fa-bed"></i> Quartos</a>
                <a href="/gerenciar-avaliacoes" class="menu-item"><i class="fa-solid fa-comment-dots"></i> Avaliações</a>
            </nav>
            <div class="sidebar-footer"><a href="/" class="menu-item logout"><i class="fa-solid fa-arrow-left"></i> Voltar ao site</a></div>
        </aside>

        <main class="admin-main-content">
            <header class="admin-content-header">
                <div>
                    <h1>Cadastrar novo quarto</h1>
                    <p>Adicione um novo modelo de acomodação</p>
                </div>
            </header>

            <form class="admin-card-form" id="formNovoQuarto" method="post" th:action="@{/quartos/criar}" enctype="multipart/form-data">
                <input type="hidden" name="codigoHotel" th:value="${codigoHotel != null ? codigoHotel : 1}">
                <div class="form-inputs-row columns-2">
                    <div class="auth-input-group">
                        <label>Número do quarto</label>
                        <input type="number" name="numero" placeholder="101" required>
                    </div>
                    <div class="auth-input-group">
                        <label>Tipo do quarto</label>
                        <input type="text" name="tipo" placeholder="Ex: suite" required>
                    </div>
                </div>

                <div class="form-inputs-row columns-2">
                    <div class="auth-input-group"><label>Preço por noite (R$)</label><input type="number" step="0.01" name="preco" placeholder="450" required></div>
                    <div class="auth-input-group"><label>Capacidade (pessoas)</label><input type="number" name="capacidade" placeholder="2" required></div>
                </div>

                <div class="auth-input-group">
                    <label>Descrição</label>
                    <textarea name="descricao" rows="4" placeholder="Descreva as características do quarto..." required></textarea>
                </div>

                <div class="admin-checkbox-amenities-section">
                    <label class="section-subtitle-label">Opções</label>
                    <div class="admin-checkbox-grid-two-cols">
                        <label class="checkbox-container"><input type="checkbox" name="aceitaPet" value="true"> Aceita PET</label>
                        <label class="checkbox-container"><input type="checkbox" name="disponivel" value="true" checked> Disponível</label>
                    </div>
                </div>

                <div class="admin-upload-zone-wrapper">
                    <label class="section-subtitle-label">Imagens do Quarto</label>
                    <div class="auth-input-group mb-16">
                        <label>Arquivos das Fotos (do computador - Selecione 1 ou vários)</label>
                        <input type="file" name="imagemArquivos" accept="image/*" multiple>
                    </div>
                    <div class="auth-input-group">
                        <label>OU URLs das Imagens (Separadas por vírgula ou linha)</label>
                        <textarea name="imagensUrls" rows="3" placeholder="https://exemplo.com/quarto1.jpg&#10;https://exemplo.com/quarto2.jpg"></textarea>
                    </div>
                </div>

                <div class="admin-actions-form-row">
                    <button type="submit" class="btn-primary">Salvar quarto</button>
                    <button type="button" class="btn-secondary-outline" onclick="window.location.href='/gerenciar-quartos'">Cancelar</button>
                </div>
            </form>
        </main>
    </div>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
