<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BahVago Admin - Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-panel-body">

    <div class="admin-layout-wrapper">
        <aside class="admin-sidebar">
            <div class="sidebar-brand">
                <span class="logo-icon">B</span>
                <div>
                    <h4>BahVago</h4>
                    <small>Gerente</small>
                </div>
            </div>
            <nav class="sidebar-menu">
                <a href="/dashboard" class="menu-item active"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="/hoteis/gerenciar-hotel" class="menu-item"><i class="fa-solid fa-hotel"></i> Meu hotel</a>
                <a href="/gerenciar-quartos" class="menu-item"><i class="fa-solid fa-bed"></i> Quartos</a>
                <a href="/gerenciar-avaliacoes" class="menu-item"><i class="fa-solid fa-comment-dots"></i> Avaliações</a>
            </nav>
            <div class="sidebar-footer">
                <a href="/" id="btnAdminLogout" class="menu-item logout"><i class="fa-solid fa-arrow-left"></i> Voltar ao site</a>
            </div>
        </aside>

        <main class="admin-main-content">
            <header class="admin-content-header">
                <div>
                    <h1>Dashboard</h1>
                    <p>Visão geral do seu hotel</p>
                </div>
            </header>

            <section class="metrics-row-grid">
                <div class="metric-card">
                    <div class="metric-header"><i class="fa-regular fa-calendar-check text-blue"></i> <span class="badge-trend positive">+12%</span></div>
                    <h3>1.247</h3>
                    <p>Total de reservas</p>
                </div>
                <div class="metric-card">
                    <div class="metric-header"><i class="fa-solid fa-percent text-blue"></i> <span class="badge-trend positive">+5%</span></div>
                    <h3>87%</h3>
                    <p>Taxa de ocupação</p>
                </div>
                <div class="metric-card">
                    <div class="metric-header"><i class="fa-regular fa-star text-blue"></i> <span class="rating-label-mini" th:text="${hotel.avaliacaoMedia != null ? 
                #numbers.formatDecimal(hotel.avaliacaoMedia,1,1) : '0.0'}"></span></div>
                <h3 th:text="${hotel.avaliacaoMedia != null ? 
                #numbers.formatDecimal(hotel.avaliacaoMedia,1,1) : '0.0'}">
                </h3>                    
                <p>Avaliação média</p>
                </div>
            </section>

            <section class="admin-section-container">
                <h4>Status dos quartos</h4>
                <div class="status-rooms-grid">
                    <div class="status-block available"><h5>12</h5><p>Disponíveis</p></div>
                    <div class="status-block occupied"><h5>18</h5><p>Ocupados</p></div>
                    <div class="status-block maintenance"><h5>2</h5><p>Manutenção</p></div>
                </div>
            </section>
        </main>
    </div>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
