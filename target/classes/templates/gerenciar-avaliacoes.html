<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BahVago Admin - Avaliações</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="admin-panel-body">
<div class="admin-layout-wrapper">
    <aside class="admin-sidebar">
        <div class="sidebar-brand">
            <span class="logo-icon">B</span>
            <div>
                <h4>BahVago</h4>
                <small>Gerente</small>
            </div>
        </div>
        <nav class="sidebar-menu">
            <a href="/dashboard" class="menu-item">
                <i class="fa-solid fa-chart-line"></i> Dashboard
            </a>
            <a href="/hoteis/gerenciar-hotel" class="menu-item">
                <i class="fa-solid fa-hotel"></i> Meu hotel
            </a>
            <a href="/gerenciar-quartos" class="menu-item">
                <i class="fa-solid fa-bed"></i> Quartos
            </a>
            <a href="/gerenciar-avaliacoes" class="menu-item active">
                <i class="fa-solid fa-comment-dots"></i> Avaliações
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="/" class="menu-item logout">
                <i class="fa-solid fa-arrow-left"></i> Voltar ao site
            </a>
        </div>
    </aside>

    <main class="admin-main-content"> 
        <header class="admin-content-header">
            <div>
                <h1>Gerenciar avaliações</h1>
                <p>Responda às avaliações dos hóspedes</p>
            </div>
        </header>

        <section class="metrics-row-grid column-3">
            <div class="metric-card-summary">
                <div class="circle-icon">
                    <i class="fa-regular fa-star"></i>
                </div>
                <div>
                    <h3 th:text="${hotel.avaliacaoMedia != null ?
                        #numbers.formatDecimal(hotel.avaliacaoMedia,1,1) : '0.0'}">
                    </h3>
                    <p>Avaliação geral</p>
                </div>
            </div>

            <div class="metric-card-summary">
                <div class="circle-icon">
                    <i class="fa-regular fa-comment"></i>
                </div>

                <div>
                    <h3 th:text="${avaliacoes.size()}"></h3>
                    <p>Total de avaliações</p>
                </div>
            </div>

            <div class="metric-card-summary">
                <div class="circle-icon yellow-bg">
                    <i class="fa-regular fa-clock"></i>
                </div>

                <div>
                    <h3 th:text="${#lists.size(avaliacoes.?[resposta == null or resposta.isBlank()])}"></h3>
                    <p>Aguardando resposta</p>
                </div>
            </div>

        </section>

        <div class="admin-tabs-filter-row">
            <button type="button" class="admin-filter-btn active" data-filter="all">Todas</button>
            <button type="button" class="admin-filter-btn" data-filter="pending">Não respondidas</button>
            <button type="button" class="admin-filter-btn" data-filter="5">5 estrelas</button>
            <button type="button" class="admin-filter-btn" data-filter="4">4 estrelas</button>
            <button type="button" class="admin-filter-btn" data-filter="3">3 estrelas ou menos</button>
        </div>

        <div class="admin-reviews-feed-stack">
            <div class="admin-review-item-box"
                 th:each="avaliacao : ${avaliacoes}"
                 th:data-id="${avaliacao.id}"
                 th:data-nota="${avaliacao.nota}"
                 th:data-hotel="${hotel.nome}"
                 th:data-respondida="${!(avaliacao.resposta == null || avaliacao.resposta.isBlank())}">
                <div class="review-item-header">
                    <div class="reviewer-meta-info">
                        <span class="user-avatar-sm"
                              th:text="${#strings.substring(avaliacao.usuario.nome,0,1)}">
                        </span>
                        <div>
                            <h5 th:text="${avaliacao.usuario.nome}"></h5>
                            <span class="stars-gold">
                                <i th:each="estrela : ${#numbers.sequence(1,5)}"
                                   th:class="${estrela <= avaliacao.nota}
                                   ? 'fa-solid fa-star'
                                   : 'fa-regular fa-star'">
                                </i>
                            </span>
                        </div>
                    </div>
                    <div class="review-date-badge-wrapper">
                        <span class="date-text"
                              th:text="${avaliacao.data}">
                        </span>
                        <span class="status-pill"
                              th:classappend="${avaliacao.resposta == null || avaliacao.resposta.isBlank()} ? ' yellow' : ' green'"
                              th:text="${avaliacao.resposta == null || avaliacao.resposta.isBlank()} ? 'Sem resposta' : 'Respondida'">
                        </span>
                    </div>
                </div>
                <p class="review-body-text-content" th:text="${avaliacao.comentario}">
                </p>
                    <div class="hotel-response"
                        th:if="${avaliacao.resposta != null && !avaliacao.resposta.isBlank()}">

                        <div class="hotel-response-header">
                            <strong>Resposta do Hotel</strong>
                            <small th:text="${#temporals.format(avaliacao.dataResposta, 'dd/MM/yyyy')}"></small>
                        </div>

                        <p th:text="${avaliacao.resposta}"></p>
                    </div>
                <div class="admin-reply-form-zone" th:if="${avaliacao.resposta == null || avaliacao.resposta.isBlank()}">
                    <textarea rows="2"
                              placeholder="Escreva sua resposta" th:text="${avaliacao.resposta}">
                    </textarea>
                    <div class="reply-actions-row">
                        <button type="button"class="btn-primary btn-sm btn-submit-reply">Enviar resposta</button>
                        <button type="button"class="btn-text btn-sm btn-cancel-reply">Cancelar</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script th:src="@{/js/script.js}"></script>

</body>
</html>
